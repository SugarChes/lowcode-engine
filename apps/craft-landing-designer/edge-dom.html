html,
body,
#__next {
  height: 100%;
}

body {
  margin: 0;
  color: #1f1f1f;
  background: #f5f7fa;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', -apple-system,
    BlinkMacSystemFont, sans-serif;
}

* {
  box-sizing: border-box;
}

.viewport {
  height: 100%;
}

.designer-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #f5f7fa;
}

.designer-toolbox,
.designer-sidebar {
  width: 280px;
  display: flex;
  flex-direction: column;
  background: #ffffff;
  border-right: 1px solid #f0f0f0;
}

.designer-sidebar {
  width: 340px;
  border-right: none;
  border-left: 1px solid #f0f0f0;
}

.designer-toolbox__header,
.designer-sidebar__header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.designer-toolbox .ant-collapse,
.designer-sidebar__tabs {
  flex: 1;
  overflow: auto;
}

.designer-toolbox .ant-collapse-content-box {
  padding-top: 8px !important;
}

.designer-material-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.designer-material-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 8px;
  min-height: 74px;
  padding: 12px;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  background: #ffffff;
  cursor: move;
  transition: border-color 0.2s ease, box-shadow 0.2s ease,
    transform 0.2s ease;
}

.designer-material-card:hover {
  border-color: #1677ff;
  box-shadow: 0 8px 24px rgb(22 119 255 / 12%);
  transform: translateY(-1px);
}

.designer-material-card__icon {
  font-size: 18px;
  color: #1677ff;
}

.designer-material-card__title {
  font-size: 13px;
  color: #262626;
  line-height: 1.4;
}

.designer-main {
  position: relative;
  display: flex;
  flex: 1;
  min-width: 0;
  flex-direction: column;
}

.designer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 18px;
  background: #ffffff;
  border-bottom: 1px solid #f0f0f0;
  z-index: 3;
}

.designer-header__brand {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}

.designer-canvas-scroll {
  flex: 1;
  overflow: auto;
  background: #f5f7fa;
}

.designer-canvas-stage {
  min-height: 100%;
  padding: 16px 20px 24px;
}

.designer-canvas-frame {
  width: min(100%, 1480px);
  margin: 0 auto;
}

.designer-canvas-frame > * {
  width: 100%;
}

.designer-sidebar .ant-tabs {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.designer-sidebar .ant-tabs-content-holder {
  flex: 1;
  min-height: 0;
  overflow: auto;
}

.designer-sidebar .ant-tabs-content,
.designer-sidebar .ant-tabs-tabpane {
  height: 100%;
}

.designer-panel-empty {
  display: flex;
  min-height: 240px;
  align-items: center;
  justify-content: center;
}

.designer-panel-head {
  padding: 16px 16px 0;
}

.designer-props-panel .ant-collapse {
  background: transparent;
}

.designer-props-panel .ant-collapse-item {
  border-bottom: 1px solid #f0f0f0;
}

.designer-props-stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.designer-props-field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.designer-props-field__label {
  font-size: 12px;
  color: #595959;
}

.designer-color-input {
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 8px;
  align-items: center;
}

.designer-color-input input[type='color'] {
  width: 44px;
  height: 32px;
  padding: 0;
  border: 1px solid #d9d9d9;
  border-radius: 6px;
  background: #ffffff;
}

.designer-box-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.designer-box-grid__item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.designer-box-grid__label {
  font-size: 12px;
  color: #8c8c8c;
}

.designer-list-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.designer-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  color: #595959;
}

.designer-list-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  border: 1px solid #f0f0f0;
  border-radius: 6px;
  background: #fafafa;
}

.designer-list-card__actions {
  display: flex;
  justify-content: flex-end;
}

.designer-layers-wrapper {
  height: 100%;
  overflow: auto;
  padding: 8px 12px 16px;
